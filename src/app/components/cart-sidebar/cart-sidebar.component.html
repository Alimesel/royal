<ng-container *ngIf="isOpen$ | async as isOpen">
  <!-- Overlay -->
  <div class="cart-overlay" [class.open]="isOpen" (click)="close()"></div>

  <!-- Sidebar -->
  <div class="cart-sidebar" [class.open]="isOpen">
    <div class="cart-head">
      <h3>Your Order</h3>
      <button class="cart-close" (click)="close()"><i class="fas fa-times"></i></button>
    </div>

    <div class="cart-body">
      <ng-container *ngIf="(items$ | async) as items">
        <div *ngIf="items.length === 0" class="cart-empty">
          <i class="fas fa-shopping-bag"></i>
          <p>Your cart is empty</p>
          <span>Add dishes to get started</span>
        </div>

        <div *ngFor="let item of items; trackBy: trackById" class="cart-item">
          <img [src]="item.image" [alt]="item.name" />
          <div class="ci-info">
            <h4>{{ item.name }}</h4>
            <p class="ci-price">${{ (item.price * item.qty).toFixed(2) }}</p>
            <div class="ci-qty">
              <button (click)="changeQty(item.id, -1)"><i class="fas fa-minus"></i></button>
              <span>{{ item.qty }}</span>
              <button (click)="changeQty(item.id,  1)"><i class="fas fa-plus"></i></button>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <div class="cart-foot">
      <div class="cart-total">
        <span>Total</span>
        <span class="total-amt">${{ total.toFixed(2) }}</span>
      </div>
      <button class="checkout-btn" (click)="placeOrder()">
        <i class="fas fa-concierge-bell"></i> Place Order
      </button>
    </div>
  </div>
</ng-container>
